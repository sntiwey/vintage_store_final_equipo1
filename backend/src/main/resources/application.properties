# ============================================================
#  Tienda Vintage - Configuración de la aplicación
# ============================================================

# Servidor
server.port=8080
server.servlet.context-path=/api

# Base de Datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tienda_vintage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Mexico_City}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vintage_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vintage1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secreto=${JWT_SECRET:clave_secreta_tienda_vintage_2024_super_segura}
jwt.expiracion=${JWT_EXPIRACION:86400000}

# Subida de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS (sobreescrito en configuración)
cors.origenes-permitidos=http://localhost:3000

# Logging
logging.level.com.tiendavintage=INFO
logging.level.org.springframework.security=WARN
